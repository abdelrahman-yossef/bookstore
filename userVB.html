    margin:0;

    padding:20px;
}
button{
    padding:10px 15px;
    cursor:pointer;
}

<body background="images/library.png">

<table border="1" bgcolor="white" width="100%" cellpadding="20">
<tr>
<td width="30%" align="center">
    <img id="bookImage" src="" width="300">
</td>
<td class="book-box">
    <h1 id="title"></h1>
    <h3 id="author"></h3>
    <h3 id="genre"></h3>
    <h3 id="pages"></h3>
    <h3 id="price"></h3>
    <p id="description"></p>
    <h3>Status: <span id="status"></span></h3>
    <button id="borrowBtn" onclick="borrowBook()">Borrow Book</button>
    <button id="returnBtn" onclick="returnBook()">Return Book</button>
</td>
