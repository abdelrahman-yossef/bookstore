  <h2>Add Book to Library</h2>
  <p>Please enter book details below:</p>
  <br>

  <form action="success.html" method="post">

    Book ID: <br>
    <input type="number" name="id" required> <br><br>

    Book Name: <br>
    <input type="text" name="bname" required> <br><br>

    Author Name: <br>
    <input type="text" name="auth" required> <br><br>

    Category: <br>
    <select name="cat" required>
      <option value="fiction">Fiction</option>
      <option value="science">Science</option>
      <option value="history">History</option>
    </select> <br><br>

    Description: <br>
    <textarea name="desc" rows="4" cols="30" required></textarea> <br><br>

    <input type="submit" value="Save Book">
    <input type="reset" value="Clear">

  </form>

  <br><hr>
  <p>2026 Online Library Project</p>

</body>
</html>
