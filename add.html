  <font color="lightgrey "><h2>Add Book to Library</h2> </font>
  <font color="lightgrey "><p>Please enter book details below:</p> </font>
  
  <br>

  

     <br>
    <input type="number" id="id" required placeholder="Book ID"> <br><br>

    <br>
    <input type="text" id="bname" required placeholder="Book Name"> <br><br>

    <br>
    <input type="text" id="bprice" required placeholder="Book Price"> <br><br>

    <br>
    <input type="text" id="author" required placeholder="Author Name"> <br><br>
    <input type="text" id="image"  placeholder="enter image path"> <br><br>

    <font color="white">Category:  </font><br>
    <select id="catigory" required>
      <option value="fiction">Fiction</option>
      <option value="science">Science</option>
      <option value="history">History</option>
    </select> <br><br>

    <br>
    <textarea id="desc" rows="4" cols="30"  placeholder=" Description"></textarea> <br><br>

    <button onclick="handleAdd()">Add Book</button>
    <input type="reset" value="Clear">



  <br>
